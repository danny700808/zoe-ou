<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金融測驗</title>
  <style>
    :root {
      --bg1: #f7f8fc;
      --bg2: #eef3ff;
      --card: rgba(255,255,255,0.92);
      --text: #1e2430;
      --muted: #667085;
      --line: rgba(15,23,42,0.08);
      --accent: #2f6df6;
      --accent2: #7a5cff;
      --shadow: 0 18px 50px rgba(40, 60, 120, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0%, #f0f4ff 35%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .app {
      width: min(900px, 100%);
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      overflow: hidden;
      position: relative;
    }
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .progress {
      flex: 1;
      height: 10px;
      background: #e8edff;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .35s ease;
    }
    .progress-text {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #edf3ff;
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
    }
    h2 {
      margin: 0 0 18px;
      font-size: clamp(22px, 3.4vw, 32px);
      line-height: 1.45;
      font-weight: 800;
    }
    p {
      margin: 0;
      line-height: 1.75;
      color: var(--muted);
      font-size: 16px;
    }
    .actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      border-radius: 18px;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease, background .18s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 14px 24px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(90, 95, 255, 0.28);
    }
    .secondary {
      background: #f2f4f7;
      color: var(--text);
      padding: 14px 24px;
      font-weight: 700;
    }
    .answers {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }
    .answer {
      width: 100%;
      text-align: left;
      padding: 18px 18px 18px 16px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .answer:hover {
      border-color: rgba(47,109,246,0.22);
      box-shadow: 0 10px 24px rgba(47,109,246,0.10);
    }
    .option-tag {
      min-width: 40px;
      height: 40px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #edf3ff;
      color: var(--accent);
      font-weight: 800;
    }
    .answer-text {
      flex: 1;
      font-size: 18px;
      line-height: 1.65;
      color: var(--text);
    }
    .screen {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .28s ease, transform .28s ease;
    }
    .screen.leaving {
      opacity: 0;
      transform: translateY(16px);
    }
    .hero {
      display: grid;
      gap: 16px;
      min-height: 420px;
      align-content: center;
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .question-number {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }
    .note {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }
    .score-box {
      margin-top: 22px;
      padding: 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f7f9ff, #eef3ff);
      border: 1px solid #dfe7ff;
    }
    .score {
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .small {
      font-size: 14px;
      color: var(--muted);
    }
    .footer {
      margin-top: 22px;
      font-size: 13px;
      color: #98a2b3;
      text-align: center;
    }
    @media (max-width: 640px) {
      .card { padding: 20px; border-radius: 20px; }
      .answer { padding: 16px 14px; }
      .answer-text { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div id="app" class="screen"></div>
      <div class="footer">金融測驗</div>
    </div>
  </div>

  <script>
    const questions = [{'id': 1, 'title': '你在社群媒體上看到一個廣告「投資1000元，一星期內翻倍成2000元！」你會？', 'options': [('A', '立刻投資，零用錢剛好不夠用，機會難得', 5), ('B', '先問看看其他人有沒有參加過，再決定', 3), ('C', '這不可能，直接忽略掉', 0)]}, {'id': 2, 'title': '你收到一封電子郵件，標題是「你的銀行帳戶異常，請點擊連結重新驗證資料！」你會？', 'options': [('A', '立刻點進去輸入資料，怕帳戶被凍結', 5), ('B', '猶豫一下，還是點了進去看看', 3), ('C', '不點連結，直接打電話問銀行', 0)]}, {'id': 3, 'title': '你想要買一款熱門的運動鞋，但官網售罄，剛好有人私訊你，提供一個「廠商內部購物網站」，而且價格比官方還便宜，你會？', 'options': [('A', '立刻點進去購買，機會難得', 5), ('B', '先搜尋一下這個網站的評價，再決定', 3), ('C', '這可能是假網站，官方品牌不會用這個方式販售', 0)]}, {'id': 4, 'title': '有人私訊你，說你中獎了，但要先匯一筆「手續費」才能領獎金，你會？', 'options': [('A', '立刻匯款，這樣才能拿到獎金', 5), ('B', '問對方能不能直接從獎金扣掉手續費', 3), ('C', '不可能的事，直接封鎖對方', 0)]}, {'id': 5, 'title': '你接到一通電話，對方自稱是銀行客服，說你的金融卡被盜領，要你提供卡號及密碼來處理，你會？', 'options': [('A', '先問對方一些問題，看是不是真的', 3), ('B', '掛斷電話，自己打客服確認', 0), ('C', '趕快提供，怕錢真的被盜走', 5)]}, {'id': 6, 'title': '你在二手平台上賣東西，買家要求用超商「賣貨便」進行交易，建立賣場後，買家告知「付款失敗」或「帳戶被凍結」，需要你聯繫客服進行「金流認證」，你會？', 'options': [('A', '詐騙成分高，直接拒絕', 0), ('B', '覺得有點奇怪，但還是想試看看', 3), ('C', '立刻點選客服，好讓錢快進來', 5)]}, {'id': 7, 'title': '你在社群媒體上看到一則打工廣告：「工作輕鬆，每天二小時，月入5萬，無需經驗。」你會？', 'options': [('A', '這薪水不太合理，應該是詐騙', 0), ('B', '立刻私訊應徵，這薪水太誘人了', 5), ('C', '先問看看工作內容，再考慮', 3)]}, {'id': 8, 'title': '你找到一份很不錯的工作，對方說：「要先繳交制服費跟保證金3000元才能入職。」你會？', 'options': [('A', '先問看看家人朋友，看看這樣正不正常', 3), ('B', '覺得不合理，工作不應該要先付錢', 0), ('C', '先付款，這樣才能順利上班', 5)]}, {'id': 9, 'title': '收到朋友傳來的 LINE 連結，希望你幫忙她國小女兒的美術作品投票，你會？', 'options': [('A', '很熟的好朋友，二話不說馬上投', 5), ('B', '不確定，但應該會幫忙', 3), ('C', '這是詐騙，最近常看到這種詐騙案例', 0)]}, {'id': 10, 'title': '你剛剛在網路上買了一件衣服，結果沒多久就收到一封簡訊說：「你的訂單付款異常，請點擊連結辦理退款。」你會？', 'options': [('A', '先問問賣家，確認訂單狀況', 3), ('B', '點進去，怕錢真的沒付成功', 5), ('C', '直接進官方網站或 APP，查詢自己的訂單狀況', 0)]}, {'id': 11, 'title': '收到朋友的 LINE 訊息：「我現在人在外面，手機不見，這是我的新帳號，能不能先借我2000元？晚點還你！」你會？', 'options': [('A', '朋友有急事，一定要幫忙一下', 5), ('B', '先打電話給朋友，確認是不是真的', 3), ('C', '直接拒絕，有可能是詐騙', 0)]}, {'id': 12, 'title': '手機收到訊息，內容是「中華電信點數即將到期」，點進連結後需要輸入個人資料及信用卡卡號，你會？', 'options': [('A', '當然要填寫，不然點數到期很可惜', 5), ('B', '這看起來像詐騙，不會參加', 0), ('C', '先問看看家人朋友的意見再做決定', 3)]}];

    let currentIndex = -1;
    let totalScore = 0;
    let answers = [];

    const app = document.getElementById('app');

    function getLevel(score) {
      if (score <= 10) {
        return {
          title: '超級防詐達人',
          message: '你的防詐意識很高，幾乎不會被騙，繼續保持！'
        };
      }
      if (score <= 20) {
        return {
          title: '有點危險',
          message: '你的金融防詐能力還不錯，但有時可能會猶豫或相信別人，要再提高警覺。'
        };
      }
      if (score <= 35) {
        return {
          title: '容易被騙要小心',
          message: '你有點容易相信陌生的金錢交易或投資機會，要學會分辨詐騙手法。'
        };
      }
      return {
        title: '高危險群',
        message: '你非常容易被詐騙，趕快學習金融防詐知識，保護自己的錢財！'
      };
    }

    function progressPercent() {
      if (currentIndex < 0) return 0;
      return Math.round((currentIndex / questions.length) * 100);
    }

    function renderStart() {
      currentIndex = -1;
      totalScore = 0;
      answers = [];
      app.innerHTML = `
        <div class="hero">
          <div class="badge">金融測驗</div>
          <h1>考考你<br>你的防詐意識有多高？</h1>
          <p>共 12 題，每題都有 A、B、C 三個選項。作答時不會顯示分數，系統會在背景自動累計，最後一次顯示總分。</p>
          <div class="actions">
            <button class="primary" id="startBtn">開始答題</button>
          </div>
          <div class="note">請依直覺作答，整體介面適合直接放在 GitHub Pages 使用。</div>
        </div>
      `;
      document.getElementById('startBtn').addEventListener('click', () => {
        transitionTo(() => {
          currentIndex = 0;
          renderQuestion();
        });
      });
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      const percent = Math.round((currentIndex / questions.length) * 100);
      app.innerHTML = `
        <div class="progress-wrap">
          <div class="progress"><div class="progress-bar" style="width:${percent}%"></div></div>
          <div class="progress-text">${currentIndex + 1} / ${questions.length}</div>
        </div>
        <div class="question-meta">
          <div class="badge">題目 ${q.id}</div>
          <div class="question-number">請選擇最符合你的答案</div>
        </div>
        <h2>${q.title}</h2>
        <div class="answers">
          ${q.options.map(option => `
            <button class="answer" data-label="${option[0]}" data-score="${option[2]}">
              <span class="option-tag">${option[0]}</span>
              <span class="answer-text">${option[1]}</span>
            </button>
          `).join('')}
        </div>
      `;

      document.querySelectorAll('.answer').forEach(btn => {
        btn.addEventListener('click', () => {
          const label = btn.dataset.label;
          const score = Number(btn.dataset.score);
          answers.push({ question: q.id, choice: label, score });
          totalScore += score;

          if (currentIndex < questions.length - 1) {
            transitionTo(() => {
              currentIndex += 1;
              renderQuestion();
            });
          } else {
            transitionTo(renderResult);
          }
        });
      });
    }

    function renderResult() {
      const level = getLevel(totalScore);
      app.innerHTML = `
        <div class="progress-wrap">
          <div class="progress"><div class="progress-bar" style="width:100%"></div></div>
          <div class="progress-text">完成</div>
        </div>
        <div class="badge">測驗完成</div>
        <h1>你的總分</h1>
        <div class="score-box">
          <div class="score">${totalScore} 分</div>
          <h2 style="margin-bottom:10px;">${level.title}</h2>
          <p>${level.message}</p>
        </div>
        <div class="actions">
          <button class="primary" id="restartBtn">重新測驗</button>
        </div>
        <div class="note">分數在作答過程中不會顯示，只有最後才會統計總分。</div>
      `;
      document.getElementById('restartBtn').addEventListener('click', () => {
        transitionTo(renderStart);
      });
    }

    function transitionTo(next) {
      app.classList.add('leaving');
      setTimeout(() => {
        app.classList.remove('leaving');
        next();
      }, 220);
    }

    renderStart();
  </script>
</body>
</html>
