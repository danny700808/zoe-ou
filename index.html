<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金融測驗</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #f7f8fc 0%, #eef3ff 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 760px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 32px 26px;
      box-shadow: 0 20px 50px rgba(33, 56, 126, 0.12);
      border: 1px solid rgba(255,255,255,0.8);
      opacity: 1;
      transform: translateY(0);
      transition: opacity .35s ease, transform .35s ease;
    }
    .card.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eaf0ff;
      color: #3856c8;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 34px;
      line-height: 1.2;
    }
    h2 {
      margin: 0 0 14px 0;
      font-size: 28px;
      line-height: 1.35;
    }
    p {
      margin: 0;
      line-height: 1.8;
      font-size: 17px;
      color: #4b5563;
    }
    .intro-text {
      margin-top: 10px;
    }
    .question-meta {
      margin-bottom: 14px;
      font-size: 15px;
      color: #6b7280;
      font-weight: 700;
    }
    .question-text {
      font-size: 26px;
      line-height: 1.55;
      color: #111827;
      margin-bottom: 20px;
      font-weight: 800;
    }
    .options {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }
    button {
      border: none;
      cursor: pointer;
      font: inherit;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .start-btn, .restart-btn {
      margin-top: 28px;
      background: #3856c8;
      color: #fff;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(56,86,200,.18);
    }
    .start-btn:hover, .restart-btn:hover {
      transform: translateY(-1px);
    }
    .option-btn {
      text-align: left;
      width: 100%;
      padding: 18px 18px;
      border-radius: 18px;
      background: #f8faff;
      border: 1px solid #dbe5ff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.03);
    }
    .option-btn:hover {
      background: #eef4ff;
      transform: translateY(-1px);
    }
    .option-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #3856c8;
      color: #fff;
      font-weight: 800;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .option-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .progress {
      margin-top: 24px;
      height: 10px;
      background: #e5ebfb;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #5674e8, #3856c8);
      width: 0%;
      transition: width .35s ease;
      border-radius: 999px;
    }
    .score {
      margin-top: 18px;
      font-size: 18px;
      color: #6b7280;
    }
    .result-box {
      margin-top: 18px;
      padding: 20px;
      background: #f7faff;
      border: 1px solid #dbe5ff;
      border-radius: 18px;
    }
    .result-title {
      margin: 0 0 10px 0;
      font-size: 28px;
      color: #1d3fb1;
      font-weight: 900;
    }
    .result-desc {
      font-size: 18px;
      line-height: 1.9;
      color: #374151;
    }
    .footer-note {
      margin-top: 14px;
      font-size: 14px;
      color: #94a3b8;
    }
    @media (max-width: 640px) {
      .card { padding: 24px 18px; border-radius: 20px; }
      h1 { font-size: 28px; }
      h2 { font-size: 24px; }
      .question-text { font-size: 22px; }
      .option-btn { padding: 16px 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app" class="card"></div>
  </div>

  <script>
    const quizData = [{"q": "你在社群媒體上看到一個廣告「投資1000元，一星期內翻倍成2000元！」你會？", "options": {"A": "立刻投資，零用錢剛好不夠用，機會難得", "B": "先問看看其他人有沒有參加過，再決定", "C": "這不可能，直接忽略掉"}, "scores": {"A": 5, "B": 3, "C": 0}}, {"q": "你收到一封電子郵件，標題是「你的銀行帳戶異常，請點擊連結重新驗證資料！」你會？", "options": {"A": "立刻點進去輸入資料，怕帳戶被凍結", "B": "猶豫一下，還是點了進去看看", "C": "不點連結，直接打電話問銀行"}, "scores": {"A": 5, "B": 3, "C": 0}}, {"q": "你想要買一款熱門的運動鞋，但官網售罄，剛好有人私訊你，提供一個「廠商內部購物網站」，而且價格比官方還便宜，你會？", "options": {"A": "立刻點進去購買，機會難得", "B": "先搜尋一下這個網站的評價，再決定", "C": "這可能是假網站，官方品牌不會用這個方式販售"}, "scores": {"A": 5, "B": 3, "C": 0}}, {"q": "有人私訊你，說你中獎了，但要先匯一筆「手續費」才能領獎金，你會？", "options": {"A": "立刻匯款，這樣才能拿到獎金", "B": "問對方能不能直接從獎金扣掉手續費", "C": "不可能的事，直接封鎖對方"}, "scores": {"A": 5, "B": 3, "C": 0}}, {"q": "你接到一通電話，對方自稱是銀行客服，說你的金融卡被盜領，要你提供卡號及密碼來處理，你會？", "options": {"A": "先問對方一些問題，看是不是真的", "B": "掛斷電話，自己打客服確認", "C": "趕快提供，怕錢真的被盜走"}, "scores": {"A": 3, "B": 0, "C": 5}}, {"q": "你在二手平台上賣東西，買家要求用超商「賣貨便」進行交易，建立賣場後，買家告知「付款失敗」或「帳戶被凍結」，需要你聯繫客服進行「金流認證」，你會？", "options": {"A": "詐騙成分高，直接拒絕", "B": "覺得有點奇怪，但還是想試看看", "C": "立刻點選客服，好讓錢快進來"}, "scores": {"A": 0, "B": 3, "C": 5}}, {"q": "你在社群媒體上看到一則打工廣告：「工作輕鬆，每天二小時，月入5萬，無需經驗。」你會？", "options": {"A": "這薪水不太合理，應該是詐騙", "B": "立刻私訊應徵，這薪水太誘人了", "C": "先問看看工作內容，再考慮"}, "scores": {"A": 0, "B": 5, "C": 3}}, {"q": "你找到一份很不錯的工作，對方說：「要先繳交制服費跟保證金3000元才能入職。」你會？", "options": {"A": "先問看看家人朋友，看看這樣正不正常", "B": "覺得不合理，工作不應該要先付錢", "C": "先付款，這樣才能順利上班"}, "scores": {"A": 3, "B": 0, "C": 5}}, {"q": "收到朋友傳來的 LINE 連結，希望你幫忙她國小女兒的美術作品投票，你會？", "options": {"A": "很熟的好朋友，二話不說馬上投", "B": "不確定，但應該會幫忙", "C": "這是詐騙，最近常看到這種詐騙案例"}, "scores": {"A": 5, "B": 3, "C": 0}}, {"q": "你剛剛在網路上買了一件衣服，結果沒多久就收到一封簡訊說：「你的訂單付款異常，請點擊連結辦理退款。」你會？", "options": {"A": "先問問賣家，確認訂單狀況", "B": "點進去，怕錢真的沒付成功", "C": "直接進官方網站或 APP，查詢自己的訂單狀況"}, "scores": {"A": 3, "B": 5, "C": 0}}, {"q": "收到朋友的 LINE 訊息：「我現在人在外面，手機不見，這是我的新帳號，能不能先借我 2000 元？晚點還你！」你會？", "options": {"A": "朋友有急事，一定要幫忙一下", "B": "先打電話給朋友，確認是不是真的", "C": "直接拒絕，有可能是詐騙"}, "scores": {"A": 5, "B": 3, "C": 0}}, {"q": "手機收到訊息，內容是「中華電信點數即將到期」，點進連結後需要輸入個人資料及信用卡卡號，你會？", "options": {"A": "當然要填寫，不然點數到期很可惜", "B": "這看起來像詐騙，不會參加", "C": "先問看看家人朋友的意見再做決定"}, "scores": {"A": 5, "B": 0, "C": 3}}];
    const resultRules = [{"min": 0, "max": 10, "title": "超級防詐達人", "desc": "你的防詐意識很高，幾乎不會被騙，繼續保持!!"}, {"min": 11, "max": 20, "title": "有點危險!!", "desc": "你的金融防詐能力還不錯，但有時可能會猶豫或相信別人，要再提高警覺!!"}, {"min": 21, "max": 35, "title": "容易被騙小心!!", "desc": "你有點容易相信陌生的金錢交易或投資機會，要學會分辨詐騙手法!"}, {"min": 36, "max": 60, "title": "高危險群!", "desc": "你非常容易被詐騙!!趕快學習金融防詐知識，保護自己的錢財!"}];
    const app = document.getElementById('app');

    let currentIndex = -1;
    let totalScore = 0;

    function transitionRender(renderFn) {
      app.classList.add('fade-out');
      setTimeout(() => {
        renderFn();
        app.classList.remove('fade-out');
      }, 180);
    }

    function getResult(score) {
      return resultRules.find(rule => score >= rule.min && score <= rule.max) || resultRules[resultRules.length - 1];
    }

    function startQuiz() {
      currentIndex = 0;
      totalScore = 0;
      transitionRender(renderQuestion);
    }

    function selectAnswer(choice) {
      const q = quizData[currentIndex];
      totalScore += q.scores[choice];
      currentIndex += 1;

      if (currentIndex < quizData.length) {
        transitionRender(renderQuestion);
      } else {
        transitionRender(renderResult);
      }
    }

    function renderIntro() {
      app.innerHTML = `
        <div class="badge">金融測驗</div>
        <h1>金融測驗</h1>
        <p class="intro-text">請依照直覺回答 12 題，每題都有 A、B、C 三個選項。作答時不會顯示分數，系統會在背景自動統計，最後再顯示你的總分與測驗結果。</p>
        <button class="start-btn" onclick="startQuiz()">開始測驗</button>
      `;
    }

    function renderQuestion() {
      const q = quizData[currentIndex];
      const progress = ((currentIndex) / quizData.length) * 100;

      app.innerHTML = `
        <div class="badge">金融測驗</div>
        <div class="question-meta">第 ${currentIndex + 1} 題 / ${quizData.length}</div>
        <div class="question-text">${q.q}</div>
        <div class="options">
          ${Object.entries(q.options).map(([key, text]) => `
            <button class="option-btn" onclick="selectAnswer('${key}')">
              <div class="option-row">
                <span class="option-label">${key}</span>
                <span>${text}</span>
              </div>
            </button>
          `).join('')}
        </div>
        <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
      `;
    }

    function renderResult() {
      const result = getResult(totalScore);
      app.innerHTML = `
        <div class="badge">測驗完成</div>
        <h2>你的測驗結果</h2>
        <div class="score">總分：<strong>${totalScore} 分</strong></div>
        <div class="result-box">
          <div class="result-title">${result.title}</div>
          <div class="result-desc">${result.desc}</div>
        </div>
        <button class="restart-btn" onclick="startQuiz()">重新測驗</button>
      `;
    }

    renderIntro();
  </script>
</body>
</html>
